type Query {
  produtor(id: Int, cpf: String): Produtor
  produtores(ids: [String]): [Produtor]
  produtoresFull: [ProdutorPropriedades]
  getUnidadeEmpresa(produtorId: Int): Produtor
}

type Mutation {
  """
  Creates a produtor (ger_pessoa) plus its two fixed categoria rows and an optional
  address/phone/propriedade in one nested write (all-or-nothing: a propriedade is never
  created without its produtor and vice versa). Returns both new ids on success
  (propriedadeId null when no propriedade was sent), or null on any execution failure
  (validation, duplicate CPF, DB errors — all logged server-side with no detail
  surfaced). GraphQL input-coercion errors (wrong types, missing required fields)
  still surface as standard GraphQL errors before execution.
  NOT idempotent: a create with an already-stored CPF returns null.
  """
  createProdutor(input: CreateProdutorInput!): CreateProdutorResult
}

type CreateProdutorResult {
  produtorId: BigInt!
  propriedadeId: BigInt
}

input CreateProdutorInput {
  nome: String!
  cpf: String!
  email: String
  dataNascimento: DateTime
  tpSexo: String
  identidade: String
  unidadeEmpresa: String!
  municipioId: Int!
  telefone: String
  endereco: EnderecoInput
  propriedade: PropriedadeInput
}

input EnderecoInput {
  logradouro: String
  numero: String
  complemento: String
  bairro: String
  cep: String
}

input PropriedadeInput {
  nome: String!
  areaTotal: Float
  geoPontoTexto: String
  municipioId: Int!
  unidadeEmpresa: String!
}

type Produtor {
  id_pessoa_demeter: BigInt!
  id_pessoa: String!
  nm_pessoa: String
  ds_apelido: String
  sn_pronaf: Int
  sn_ativo: Int
  tp_sexo: String
  nr_cpf_cnpj: String!
  dt_nascimento: DateTime
  nr_identidade: String
  ds_orgao_expedidor: String
  fk_uf_emissor: Int
  tp_desativacao: Int
  dt_desativacao: String
  nm_nacionalidade: String
  fk_est_civil: Int
  nm_mae: String
  nm_pai: String
  nm_profissao: String
  nr_ins_produtor_rural: String
  dap: String
  tp_pessoa: String
  id_und_empresa: String
  sn_principal_provedor: String
  ds_email: String
  dt_update_record: DateTime
  id_sincronismo: String
  sn_ctd: Int
  caf: String
  sn_plantao_tecnico: Int
  propriedades: [Propriedade]
  perfis: [Perfil]
}
