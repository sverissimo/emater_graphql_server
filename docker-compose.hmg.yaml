services:
  graphql_server_hmg:
    image: graphql_server_hmg
    build:
      context: .
      dockerfile: Dockerfile.hmg
      args:
        - HOST_UID=${HOST_UID}
        - HOST_GID=${HOST_GID}
    command: "npm run start:prod"
    env_file:
      - .env.homolog
    environment:
      - NODE_ENV=staging
    volumes:
      - /home/apps/emater_graphql_server/logs/hmg:/home/node/logs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 2048M
    networks:
      - demeter_gateway_hmg

networks:
  demeter_gateway_hmg:
    name: demeter_gateway_hmg

