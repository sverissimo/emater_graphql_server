services:
  graphql_server_hmg:
    image: graphql_server_hmg
    build:
      context: .
      dockerfile: Dockerfile.hmg
      args:
        - HOST_UID=${HOST_UID}
        - HOST_GID=${HOST_GID}
    command: "npm run start:prod"
    env_file:
      - .env.homolog
    environment:
      - NODE_ENV=staging
    volumes:
      - /home/apps/emater_graphql_server/logs/hmg:/home/node/logs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 2048M
    networks:
      - pnae_hmg
      - cmc_hmg
      - emater_gql_hmg

networks:
  pnae_hmg:
    external: true
  cmc_hmg:
    external: true
  emater_gql_hmg:
    name: emater_gql_hmg

